<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090a0f;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --primary: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
      --primary-hover: linear-gradient(135deg, #ff4b2b 0%, #ff416c 100%);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient blobs background */
    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.15;
    }
    .blob-1 {
      background: #ff416c;
      top: -10%;
      left: -10%;
      animation: float 20s infinite alternate;
    }
    .blob-2 {
      background: #4f46e5;
      bottom: -10%;
      right: -10%;
      animation: float 20s infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -60px) scale(1.1); }
      100% { transform: translate(-20px, 20px) scale(0.9); }
    }

    .container {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 3rem 2.5rem;
      border-radius: 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      z-index: 1;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 1rem 1.25rem;
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #ff416c;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(255, 65, 108, 0.25);
    }

    .btn {
      width: 100%;
      background: var(--primary);
      border: none;
      padding: 1.1rem;
      border-radius: 12px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 24px rgba(255, 75, 43, 0.3);
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255, 75, 43, 0.45);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .message {
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      display: none;
      animation: slideIn 0.3s ease;
      line-height: 1.4;
    }

    @keyframes slideIn {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error);
    }

    .message.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <h1>New Password</h1>
    <p class="subtitle">Enter your new credentials below to restore access.</p>

    <form id="resetForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" required minlength="6" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required minlength="6" placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Update Password</button>
    </form>

    <div id="statusMessage" class="message"></div>
  </div>

  <script>
    // Get token from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const form = document.getElementById('resetForm');
    const msgBox = document.getElementById('statusMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!token) {
        showMsg('Reset token is missing from the URL.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMsg('Passwords do not match.', 'error');
        return;
      }

      try {
        const response = await fetch('/api/v1/auth/forgot/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ token, newPassword: password }),
        });

        const data = await response.json();

        if (response.ok) {
          showMsg('Password successfully changed! You can close this tab and log in now.', 'success');
          form.style.display = 'none';
        } else {
          showMsg(data.error || 'Something went wrong.', 'error');
        }
      } catch (err) {
        showMsg('Network error. Failed to connect to server.', 'error');
      }
    });

    function showMsg(txt, type) {
      msgBox.textContent = txt;
      msgBox.className = `message ${type}`;
      msgBox.style.display = 'block';
    }
  </script>
</body>
</html>
